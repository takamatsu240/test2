<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプルメモアプリ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .memo-form {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-edit {
            background: #4CAF50;
            color: white;
            padding: 8px 16px;
            font-size: 0.9rem;
            margin-right: 5px;
        }

        .btn-delete {
            background: #f44336;
            color: white;
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .memos-list {
            display: grid;
            gap: 20px;
        }

        .memo-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .memo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .memo-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .memo-content {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }

        .memo-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .memo-date {
            color: #999;
            font-size: 0.85rem;
        }

        .memo-actions {
            display: flex;
            gap: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .empty-state h2 {
            color: #999;
            font-size: 1.5rem;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }

            .memo-form {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 メモアプリ</h1>
            <p>思いついたことをすぐにメモ</p>
        </div>

        <div class="memo-form">
            <form id="memoForm">
                <div class="form-group">
                    <input
                        type="text"
                        id="memoTitle"
                        placeholder="タイトルを入力..."
                        required
                    >
                </div>
                <div class="form-group">
                    <textarea
                        id="memoContent"
                        placeholder="メモの内容を入力..."
                        required
                    ></textarea>
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    メモを追加
                </button>
            </form>
        </div>

        <div class="memos-list" id="memosList"></div>
    </div>

    <script>
        class MemoApp {
            constructor() {
                this.memos = this.loadMemos();
                this.editingId = null;
                this.init();
            }

            init() {
                document.getElementById('memoForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.saveMemo();
                });
                this.renderMemos();
            }

            loadMemos() {
                const stored = localStorage.getItem('memos');
                return stored ? JSON.parse(stored) : [];
            }

            saveMemos() {
                localStorage.setItem('memos', JSON.stringify(this.memos));
            }

            saveMemo() {
                const title = document.getElementById('memoTitle').value.trim();
                const content = document.getElementById('memoContent').value.trim();

                if (!title || !content) return;

                if (this.editingId !== null) {
                    // 編集モード
                    const memo = this.memos.find(m => m.id === this.editingId);
                    memo.title = title;
                    memo.content = content;
                    memo.updatedAt = new Date().toISOString();
                    this.editingId = null;
                    document.getElementById('submitBtn').textContent = 'メモを追加';
                } else {
                    // 新規追加
                    const memo = {
                        id: Date.now(),
                        title,
                        content,
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    };
                    this.memos.unshift(memo);
                }

                this.saveMemos();
                this.renderMemos();
                document.getElementById('memoForm').reset();
            }

            editMemo(id) {
                const memo = this.memos.find(m => m.id === id);
                if (!memo) return;

                document.getElementById('memoTitle').value = memo.title;
                document.getElementById('memoContent').value = memo.content;
                document.getElementById('submitBtn').textContent = 'メモを更新';
                this.editingId = id;

                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            deleteMemo(id) {
                if (!confirm('このメモを削除してもよろしいですか?')) return;

                this.memos = this.memos.filter(m => m.id !== id);
                this.saveMemos();
                this.renderMemos();

                if (this.editingId === id) {
                    this.editingId = null;
                    document.getElementById('memoForm').reset();
                    document.getElementById('submitBtn').textContent = 'メモを追加';
                }
            }

            formatDate(dateString) {
                const date = new Date(dateString);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                return `${year}/${month}/${day} ${hours}:${minutes}`;
            }

            renderMemos() {
                const list = document.getElementById('memosList');

                if (this.memos.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <h2>メモがまだありません</h2>
                            <p>上のフォームから新しいメモを作成してください</p>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = this.memos.map(memo => `
                    <div class="memo-card">
                        <div class="memo-title">${this.escapeHtml(memo.title)}</div>
                        <div class="memo-content">${this.escapeHtml(memo.content)}</div>
                        <div class="memo-footer">
                            <div class="memo-date">
                                ${this.formatDate(memo.updatedAt)}
                            </div>
                            <div class="memo-actions">
                                <button class="btn btn-edit" onclick="app.editMemo(${memo.id})">
                                    編集
                                </button>
                                <button class="btn btn-delete" onclick="app.deleteMemo(${memo.id})">
                                    削除
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        const app = new MemoApp();
    </script>
</body>
</html>
