<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプルメモアプリ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 103, 103, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(138, 35, 135, 0.3) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            align-items: start;
        }

        .sidebar {
            position: sticky;
            top: 20px;
        }

        .calendar-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            margin-bottom: 20px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header h2 {
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .calendar-nav {
            display: flex;
            gap: 10px;
        }

        .calendar-nav button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2rem;
        }

        .calendar-nav button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .calendar-weekday {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 0;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            position: relative;
            background: rgba(255, 255, 255, 0.03);
        }

        .calendar-day:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
        }

        .calendar-day.other-month {
            color: rgba(255, 255, 255, 0.3);
        }

        .calendar-day.today {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .calendar-day.selected {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        .calendar-day.has-memo::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 5px;
            height: 5px;
            background: #38ef7d;
            border-radius: 50%;
            box-shadow: 0 0 8px #38ef7d;
        }

        .filter-info {
            background: rgba(255, 255, 255, 0.08);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .filter-info p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .clear-filter {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
            transition: all 0.3s;
        }

        .clear-filter:hover {
            box-shadow: 0 6px 20px rgba(235, 51, 73, 0.3);
            transform: translateY(-2px);
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .memo-form {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow:
                0 8px 32px 0 rgba(31, 38, 135, 0.37),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
            margin-bottom: 40px;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            font-size: 1rem;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.6);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
            transform: translateY(-2px);
        }

        .btn-edit {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 10px 20px;
            font-size: 0.9rem;
            margin-right: 8px;
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.2);
        }

        .btn-edit:hover {
            box-shadow: 0 6px 20px rgba(56, 239, 125, 0.3);
        }

        .btn-delete {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
            padding: 10px 20px;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(235, 51, 73, 0.2);
        }

        .btn-delete:hover {
            box-shadow: 0 6px 20px rgba(235, 51, 73, 0.3);
        }

        .memos-list {
            display: grid;
            gap: 24px;
            animation: fadeIn 0.6s ease-out 0.2s both;
        }

        .memo-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 28px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow:
                0 8px 32px 0 rgba(31, 38, 135, 0.25),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideInUp 0.5s ease-out both;
        }

        .memo-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow:
                0 20px 40px 0 rgba(31, 38, 135, 0.35),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .memo-title {
            font-size: 1.5rem;
            color: white;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .memo-content {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.7;
            margin-bottom: 20px;
            white-space: pre-wrap;
            font-size: 1.05rem;
        }

        .memo-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .memo-date {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .memo-actions {
            display: flex;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .empty-state h2 {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.8rem;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .empty-state p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.1rem;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }

            .calendar-container {
                margin-bottom: 30px;
            }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2.2rem;
            }

            .memo-form {
                padding: 24px;
            }

            .memo-card {
                padding: 24px;
            }

            .memo-title {
                font-size: 1.3rem;
            }

            .btn-edit,
            .btn-delete {
                padding: 8px 16px;
                font-size: 0.85rem;
            }

            .calendar-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>メモアプリ</h1>
            <p>アイデアを美しく保存</p>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <div class="calendar-container">
                    <div class="calendar-header">
                        <h2 id="calendarMonth"></h2>
                        <div class="calendar-nav">
                            <button id="prevMonth">‹</button>
                            <button id="nextMonth">›</button>
                        </div>
                    </div>
                    <div class="calendar-weekdays">
                        <div class="calendar-weekday">日</div>
                        <div class="calendar-weekday">月</div>
                        <div class="calendar-weekday">火</div>
                        <div class="calendar-weekday">水</div>
                        <div class="calendar-weekday">木</div>
                        <div class="calendar-weekday">金</div>
                        <div class="calendar-weekday">土</div>
                    </div>
                    <div class="calendar-days" id="calendarDays"></div>
                </div>
                <div class="filter-info" id="filterInfo" style="display: none;">
                    <p id="filterText"></p>
                    <button class="clear-filter" onclick="app.clearFilter()">
                        フィルターをクリア
                    </button>
                </div>
            </div>

            <div class="content-area">
                <div class="memo-form">
                    <form id="memoForm">
                        <div class="form-group">
                            <input
                                type="text"
                                id="memoTitle"
                                placeholder="タイトルを入力..."
                                required
                            >
                        </div>
                        <div class="form-group">
                            <textarea
                                id="memoContent"
                                placeholder="メモの内容を入力..."
                                required
                            ></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            メモを追加
                        </button>
                    </form>
                </div>

                <div class="memos-list" id="memosList"></div>
            </div>
        </div>
    </div>

    <script>
        class MemoApp {
            constructor() {
                this.memos = this.loadMemos();
                this.editingId = null;
                this.currentDate = new Date();
                this.selectedDate = null;
                this.init();
            }

            init() {
                document.getElementById('memoForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.saveMemo();
                });

                document.getElementById('prevMonth').addEventListener('click', () => {
                    this.currentDate.setMonth(this.currentDate.getMonth() - 1);
                    this.renderCalendar();
                });

                document.getElementById('nextMonth').addEventListener('click', () => {
                    this.currentDate.setMonth(this.currentDate.getMonth() + 1);
                    this.renderCalendar();
                });

                this.renderCalendar();
                this.renderMemos();
            }

            loadMemos() {
                const stored = localStorage.getItem('memos');
                return stored ? JSON.parse(stored) : [];
            }

            saveMemos() {
                localStorage.setItem('memos', JSON.stringify(this.memos));
            }

            saveMemo() {
                const title = document.getElementById('memoTitle').value.trim();
                const content = document.getElementById('memoContent').value.trim();

                if (!title || !content) return;

                if (this.editingId !== null) {
                    // 編集モード
                    const memo = this.memos.find(m => m.id === this.editingId);
                    memo.title = title;
                    memo.content = content;
                    memo.updatedAt = new Date().toISOString();
                    this.editingId = null;
                    document.getElementById('submitBtn').textContent = 'メモを追加';
                } else {
                    // 新規追加
                    const memo = {
                        id: Date.now(),
                        title,
                        content,
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    };
                    this.memos.unshift(memo);
                }

                this.saveMemos();
                this.renderMemos();
                document.getElementById('memoForm').reset();
            }

            editMemo(id) {
                const memo = this.memos.find(m => m.id === id);
                if (!memo) return;

                document.getElementById('memoTitle').value = memo.title;
                document.getElementById('memoContent').value = memo.content;
                document.getElementById('submitBtn').textContent = 'メモを更新';
                this.editingId = id;

                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            deleteMemo(id) {
                if (!confirm('このメモを削除してもよろしいですか?')) return;

                this.memos = this.memos.filter(m => m.id !== id);
                this.saveMemos();
                this.renderMemos();

                if (this.editingId === id) {
                    this.editingId = null;
                    document.getElementById('memoForm').reset();
                    document.getElementById('submitBtn').textContent = 'メモを追加';
                }
            }

            formatDate(dateString) {
                const date = new Date(dateString);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                return `${year}/${month}/${day} ${hours}:${minutes}`;
            }

            renderMemos() {
                const list = document.getElementById('memosList');
                let filteredMemos = this.memos;

                if (this.selectedDate) {
                    const selectedDateStr = this.formatDateOnly(this.selectedDate);
                    filteredMemos = this.memos.filter(memo => {
                        const memoDateStr = this.formatDateOnly(new Date(memo.createdAt));
                        return memoDateStr === selectedDateStr;
                    });
                }

                if (filteredMemos.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <h2>メモがまだありません</h2>
                            <p>${this.selectedDate ? 'この日のメモはありません' : '上のフォームから新しいメモを作成してください'}</p>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = filteredMemos.map(memo => `
                    <div class="memo-card">
                        <div class="memo-title">${this.escapeHtml(memo.title)}</div>
                        <div class="memo-content">${this.escapeHtml(memo.content)}</div>
                        <div class="memo-footer">
                            <div class="memo-date">
                                ${this.formatDate(memo.updatedAt)}
                            </div>
                            <div class="memo-actions">
                                <button class="btn btn-edit" onclick="app.editMemo(${memo.id})">
                                    編集
                                </button>
                                <button class="btn btn-delete" onclick="app.deleteMemo(${memo.id})">
                                    削除
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            renderCalendar() {
                const year = this.currentDate.getFullYear();
                const month = this.currentDate.getMonth();

                document.getElementById('calendarMonth').textContent =
                    `${year}年 ${month + 1}月`;

                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const prevLastDay = new Date(year, month, 0);

                const firstDayOfWeek = firstDay.getDay();
                const lastDate = lastDay.getDate();
                const prevLastDate = prevLastDay.getDate();

                const today = new Date();
                const todayStr = this.formatDateOnly(today);

                let days = [];

                // 前月の日付
                for (let i = firstDayOfWeek - 1; i >= 0; i--) {
                    const date = new Date(year, month - 1, prevLastDate - i);
                    days.push({ date, otherMonth: true });
                }

                // 当月の日付
                for (let i = 1; i <= lastDate; i++) {
                    const date = new Date(year, month, i);
                    days.push({ date, otherMonth: false });
                }

                // 次月の日付（6週表示にする）
                const remainingCells = 42 - days.length;
                for (let i = 1; i <= remainingCells; i++) {
                    const date = new Date(year, month + 1, i);
                    days.push({ date, otherMonth: true });
                }

                const calendarDays = document.getElementById('calendarDays');
                calendarDays.innerHTML = days.map(({ date, otherMonth }) => {
                    const dateStr = this.formatDateOnly(date);
                    const isToday = dateStr === todayStr;
                    const isSelected = this.selectedDate && dateStr === this.formatDateOnly(this.selectedDate);
                    const hasMemo = this.memos.some(memo =>
                        this.formatDateOnly(new Date(memo.createdAt)) === dateStr
                    );

                    let classes = ['calendar-day'];
                    if (otherMonth) classes.push('other-month');
                    if (isToday) classes.push('today');
                    if (isSelected) classes.push('selected');
                    if (hasMemo) classes.push('has-memo');

                    return `
                        <div class="${classes.join(' ')}" onclick="app.selectDate('${dateStr}')">
                            ${date.getDate()}
                        </div>
                    `;
                }).join('');
            }

            selectDate(dateStr) {
                const [year, month, day] = dateStr.split('-');
                this.selectedDate = new Date(year, month - 1, day);

                const filterInfo = document.getElementById('filterInfo');
                const filterText = document.getElementById('filterText');
                filterInfo.style.display = 'block';
                filterText.textContent = `📅 ${year}年${month}月${day}日のメモ`;

                this.renderCalendar();
                this.renderMemos();
            }

            clearFilter() {
                this.selectedDate = null;
                document.getElementById('filterInfo').style.display = 'none';
                this.renderCalendar();
                this.renderMemos();
            }

            formatDateOnly(date) {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        const app = new MemoApp();
    </script>
</body>
</html>
